name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: ['main', 'master']
    tags: ['v*']

permissions:
  contents: write

env:
  DEPLOY_LOCATION: samuelmarks.github.io/cdd-web-ui

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cdd-web-ui
        uses: actions/checkout@v6
        with:
          path: 'cdd-web-ui'

      - name: Checkout cdd-ctl
        uses: actions/checkout@v6
        with:
          repository: 'SamuelMarks/cdd-ctl'
          path: 'cdd-ctl'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build WASM SDK
        working-directory: ./cdd-ctl/cdd-ctl-wasm-sdk
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Fetch and Optimize WASM Binaries
        working-directory: ./cdd-ctl
        run: |
          chmod +x ./scripts/fetch_wasm.sh
          ./scripts/fetch_wasm.sh

          mkdir -p ./optimized-wasm
          for wasm_file in cdd-ctl-wasm-sdk/assets/wasm/*.wasm; do
            filename=$(basename "$wasm_file")
            echo "Optimizing $filename..."
            wasm-opt -O3 "$wasm_file" -o "./optimized-wasm/$filename" || cp "$wasm_file" "./optimized-wasm/$filename"
          done

      - name: Upload Artifacts (Version Tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'cdd-ctl/optimized-wasm/*.wasm'
          allowUpdates: true
          replacesArtifacts: true

      - name: Update latest tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        working-directory: ./cdd-web-ui
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --tags

          # Delete the latest tag locally and remotely if it exists
          git tag -d latest || true
          git push origin :refs/tags/latest || true

          # Create the latest tag on the current commit and push it
          git tag latest
          git push origin latest

      - name: Install UI Dependencies
        working-directory: ./cdd-web-ui
        run: npm ci --ignore-scripts

      - name: Compute base-href and Build Angular App
        working-directory: ./cdd-web-ui
        run: |
          BASE_PATH=$(echo $DEPLOY_LOCATION | sed -e 's/^[^\/]*//')
          if [ -z "$BASE_PATH" ] || [ "$BASE_PATH" == "/" ]; then
             BASE_HREF="/"
          else
             BASE_HREF="$BASE_PATH/"
          fi
          echo "Building Angular with --base-href=$BASE_HREF"
          npx ng build --configuration production --base-href $BASE_HREF

      - name: Deploy using angular-cli-ghpages
        working-directory: ./cdd-web-ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx angular-cli-ghpages --dir=dist/tmp-app/browser --no-silent

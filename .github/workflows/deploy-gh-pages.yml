name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

env:
  DEPLOY_LOCATION: samuelmarks.github.io/cdd-web-ui

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cdd-web-ui
        uses: actions/checkout@v4
        with:
          path: 'cdd-web-ui'

      - name: Checkout cdd-ctl
        uses: actions/checkout@v4
        with:
          repository: 'SamuelMarks/cdd-ctl'
          path: 'cdd-ctl'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Binaryen
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build WASM SDK
        working-directory: ./cdd-ctl/cdd-ctl-wasm-sdk
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Fetch and Optimize WASM Binaries
        working-directory: ./cdd-ctl
        run: |
          chmod +x ./scripts/fetch_wasm.sh
          ./scripts/fetch_wasm.sh
          
          mkdir -p ./optimized-wasm
          for wasm_file in cdd-ctl-wasm-sdk/assets/wasm/*.wasm; do
            filename=$(basename "$wasm_file")
            echo "Optimizing $filename..."
            wasm-opt -O3 "$wasm_file" -o "./optimized-wasm/$filename" || cp "$wasm_file" "./optimized-wasm/$filename"
          done

      - name: Publish to GitHub Releases (latest)
        working-directory: ./cdd-web-ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure git tags are loaded
          git fetch --tags
          # Delete the 'latest' release and tag if they exist
          gh release delete latest --cleanup-tag -y || true
          
          # Create a new release and upload all optimized wasm files
          gh release create latest ../cdd-ctl/optimized-wasm/*.wasm --title "Latest WASM Assets" --notes "Auto-generated WASM binaries optimized with -O3" --target ${{ github.sha }}

      - name: Install UI Dependencies
        working-directory: ./cdd-web-ui
        run: npm ci --ignore-scripts

      - name: Compute base-href and Build Angular App
        working-directory: ./cdd-web-ui
        run: |
          BASE_PATH=$(echo $DEPLOY_LOCATION | sed -e 's/^[^\/]*//')
          if [ -z "$BASE_PATH" ] || [ "$BASE_PATH" == "/" ]; then
             BASE_HREF="/"
          else
             BASE_HREF="$BASE_PATH/"
          fi
          echo "Building Angular with --base-href=$BASE_HREF"
          npx ng build --configuration production --base-href $BASE_HREF

      - name: Deploy using angular-cli-ghpages
        working-directory: ./cdd-web-ui
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx angular-cli-ghpages --dir=dist/tmp-app/browser --no-silent

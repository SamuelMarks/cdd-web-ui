name: CI
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cdd-web-ui
        uses: actions/checkout@v6
        with:
          path: cdd-web-ui

      - name: Checkout cdd-browser-sdk
        uses: actions/checkout@v6
        with:
          repository: SamuelMarks/cdd-browser-sdk
          path: cdd-browser-sdk

      - name: Checkout cdd-docs-ui
        uses: actions/checkout@v6
        with:
          repository: SamuelMarks/cdd-docs-ui
          path: cdd-docs-ui

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Build cdd-browser-sdk
        run: |
          npm ci
          npm run build
        working-directory: cdd-browser-sdk

      - name: Build cdd-docs-ui
        run: |
          npm ci
          npm run build
        working-directory: cdd-docs-ui

      - name: Install Dependencies
        run: npm install
        working-directory: cdd-web-ui

      - name: Check Formatting
        run: npm run format:check
        working-directory: cdd-web-ui

      - name: Lint Code
        run: npm run lint
        working-directory: cdd-web-ui

      - name: Build
        run: npm run build
        working-directory: cdd-web-ui

      - name: Run Tests with Coverage
        run: npm run test:coverage
        working-directory: cdd-web-ui

      - name: Get Playwright Version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'].replace(/[\^~]/g, ''))")" >> $GITHUB_ENV
        working-directory: cdd-web-ui

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers and OS Dependencies
        run: npx --yes @playwright/test install --with-deps chromium firefox
        working-directory: cdd-web-ui
        env:
          CI: true
          DEBIAN_FRONTEND: noninteractive
          DEBUG: pw:install

      - name: Run E2E Tests
        run: npm run e2e
        working-directory: cdd-web-ui
